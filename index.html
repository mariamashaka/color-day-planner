<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day Planner</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="app">

  <!-- ═══════════════════════════════════════════
       TOP BAR
  ═══════════════════════════════════════════ -->
  <header id="top-bar">
    <div id="workspace-tabs-wrapper">
      <a href="projects.html" style="display:flex;align-items:center;padding:5px 10px;border-radius:20px;font-size:13px;font-weight:500;color:var(--text-secondary);text-decoration:none;white-space:nowrap;transition:background 0.15s,color 0.15s;margin-right:4px;">📁 Projects</a>
      <a href="tracker.html"  style="display:flex;align-items:center;padding:5px 10px;border-radius:20px;font-size:13px;font-weight:500;color:var(--text-secondary);text-decoration:none;white-space:nowrap;transition:background 0.15s,color 0.15s;margin-right:4px;">📚 Tracker</a>
      <a href="archive.html"  style="display:flex;align-items:center;padding:5px 10px;border-radius:20px;font-size:13px;font-weight:500;color:var(--text-secondary);text-decoration:none;white-space:nowrap;transition:background 0.15s,color 0.15s;margin-right:4px;">📊 Archive</a>
      <a href="settings.html" style="display:flex;align-items:center;padding:5px 10px;border-radius:20px;font-size:13px;font-weight:500;color:var(--text-secondary);text-decoration:none;white-space:nowrap;transition:background 0.15s,color 0.15s;margin-right:8px;border-right:1px solid var(--border);">⚙️</a>
      <div id="workspace-tabs">
        <!-- Workspace tabs rendered by JS -->
      </div>
      <button id="btn-add-workspace" class="icon-btn" title="Add workspace">
        <i data-lucide="plus"></i>
      </button>
    </div>
    <button id="btn-create-task" class="primary-btn">
      <i data-lucide="plus"></i> Create Task
    </button>
    <div id="auth-section" style="margin-left: 10px;">
        <button onclick="signInWithGoogle()" style="background: #4285F4; color: white; border: none; padding: 5px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 5px;">
           <span style="background: white; color: #4285F4; border-radius: 50%; width: 15px; height: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold;">G</span>
           Войти
        </button>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════
       MAIN LAYOUT
  ═══════════════════════════════════════════ -->
  <div id="main-layout">

    <!-- LEFT PANEL -->
    <aside id="left-panel">

      <!-- Weekly Routines -->
      <section class="panel-section" id="section-weekly">
        <div class="section-header">
          <span class="section-title">Weekly Routines</span>
          <div class="section-actions">
            <button class="icon-btn" id="btn-add-routine" title="Add routine"><i data-lucide="plus"></i></button>
            <button class="icon-btn" id="btn-reset-routines" title="Reset week"><i data-lucide="rotate-ccw"></i></button>
          </div>
        </div>
        <div id="weekly-routines-list">
          <!-- Rendered by JS -->
        </div>
      </section>

      <!-- Daily Routines (pinned to bottom) -->
      <section class="panel-section" id="section-daily">
        <div class="section-header">
          <span class="section-title">Morning</span>
        </div>
        <div id="morning-list">
          <!-- Rendered by JS -->
        </div>
        <button class="add-inline-btn" id="btn-add-morning">+ Add</button>

        <div class="section-header" style="margin-top: 12px;">
          <span class="section-title">Evening</span>
        </div>
        <div id="evening-list">
          <!-- Rendered by JS -->
        </div>
        <button class="add-inline-btn" id="btn-add-evening">+ Add</button>

        <button class="reset-day-btn" id="btn-reset-day">
          <i data-lucide="sun"></i> Reset day
        </button>
      </section>

    </aside>

    <!-- CALENDAR -->
    <main id="calendar-area">
      <div id="calendar-nav">
        <button class="icon-btn" id="btn-prev-month"><i data-lucide="chevron-left"></i></button>
        <span id="calendar-month-label"></span>
        <button class="icon-btn" id="btn-next-month"><i data-lucide="chevron-right"></i></button>
      </div>
      <div id="calendar-weekdays">
        <div>Mon</div><div>Tue</div><div>Wed</div>
        <div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
      </div>
      <div id="calendar-grid">
        <!-- Rendered by JS -->
      </div>
    </main>

  </div><!-- /main-layout -->

</div><!-- /app -->


<!-- ═══════════════════════════════════════════
     OVERLAY
═══════════════════════════════════════════ -->
<div id="overlay"></div>


<!-- ═══════════════════════════════════════════
     POPUP: TASK
═══════════════════════════════════════════ -->
<div class="popup" id="popup-task">
  <div class="popup-header">
    <span class="popup-title" id="popup-task-title">New Task</span>
    <button class="icon-btn popup-close" data-popup="popup-task"><i data-lucide="x"></i></button>
  </div>
  <div class="popup-body">
    <label>Title
      <input type="text" id="task-input-title" placeholder="What needs to be done?" />
    </label>
    <label>Date
      <input type="date" id="task-input-date" />
    </label>
    <label>Workspace
      <select id="task-input-workspace"></select>
    </label>
    <label>Category
      <select id="task-input-category">
        <option value="">— No category —</option>
      </select>
    </label>
    <label>Project
      <select id="task-input-project">
        <option value="">— No project —</option>
      </select>
    </label>
    <label>Note
      <textarea id="task-input-note" placeholder="Optional note..." rows="2"></textarea>
    </label>

    <!-- RECURRENCE -->
    <div id="recurrence-section">
      <div style="display:flex;align-items:center;gap:10px;padding:2px 0;">
        <input type="checkbox" id="task-input-repeat"
          style="width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;">
        <label for="task-input-repeat"
          style="font-size:13px;color:var(--text-secondary);cursor:pointer;text-transform:none;letter-spacing:0;font-weight:400;">
          Repeat
        </label>
      </div>
      <div id="recurrence-options" style="display:none;padding:8px 0 0 26px;display:none;flex-direction:column;gap:8px;">
        <select id="recur-type" style="font-size:13px;padding:5px 8px;border:1.5px solid var(--border);border-radius:5px;background:var(--surface-2);">
          <option value="daily">Every day</option>
          <option value="weekly">Every week</option>
          <option value="nweekly">Every N weeks</option>
          <option value="monthly-date">Monthly — fixed date</option>
          <option value="monthly-dow">Monthly — day of week</option>
        </select>

        <!-- weekly / nweekly: pick day of week -->
        <div id="recur-dow-row" style="display:none;align-items:center;gap:6px;flex-wrap:wrap;">
          <span style="font-size:12px;color:var(--text-muted);">On:</span>
          <div id="recur-dow-btns" style="display:flex;gap:4px;"></div>
        </div>

        <!-- nweekly: interval -->
        <div id="recur-interval-row" style="display:none;align-items:center;gap:8px;">
          <span style="font-size:12px;color:var(--text-muted);">Every</span>
          <input type="number" id="recur-interval" min="2" max="12" value="2"
            style="width:52px;font-size:13px;padding:4px 6px;border:1.5px solid var(--border);border-radius:5px;background:var(--surface-2);">
          <span style="font-size:12px;color:var(--text-muted);">weeks</span>
        </div>

        <!-- monthly-date: day number -->
        <div id="recur-mday-row" style="display:none;align-items:center;gap:8px;">
          <span style="font-size:12px;color:var(--text-muted);">Day</span>
          <input type="number" id="recur-mday" min="1" max="31" value="1"
            style="width:52px;font-size:13px;padding:4px 6px;border:1.5px solid var(--border);border-radius:5px;background:var(--surface-2);">
          <span style="font-size:12px;color:var(--text-muted);">of each month</span>
        </div>

        <!-- monthly-dow: which week + day -->
        <div id="recur-mdow-row" style="display:none;align-items:center;gap:6px;flex-wrap:wrap;">
          <select id="recur-week-of-month"
            style="font-size:13px;padding:4px 6px;border:1.5px solid var(--border);border-radius:5px;background:var(--surface-2);">
            <option value="1">1st</option>
            <option value="2">2nd</option>
            <option value="3">3rd</option>
            <option value="4">4th</option>
            <option value="-1">Last</option>
          </select>
          <div id="recur-mdow-btns" style="display:flex;gap:4px;"></div>
        </div>

        <!-- end date -->
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:12px;color:var(--text-muted);">Until:</span>
          <input type="date" id="recur-until"
            style="font-size:13px;padding:4px 6px;border:1.5px solid var(--border);border-radius:5px;background:var(--surface-2);">
          <span style="font-size:11px;color:var(--text-muted);">(optional)</span>
        </div>
      </div>
    </div>
  </div>
  <div class="popup-footer">
    <button class="secondary-btn popup-close" data-popup="popup-task">Cancel</button>
    <button class="danger-btn" id="btn-task-delete" style="display:none;">Delete</button>
    <button class="primary-btn" id="btn-task-save">Save</button>
  </div>
</div>


<!-- ═══════════════════════════════════════════
     POPUP: WORKSPACE
═══════════════════════════════════════════ -->
<div class="popup" id="popup-workspace">
  <div class="popup-header">
    <span class="popup-title" id="popup-workspace-title">New Workspace</span>
    <button class="icon-btn popup-close" data-popup="popup-workspace"><i data-lucide="x"></i></button>
  </div>
  <div class="popup-body">
    <label>Name
      <input type="text" id="workspace-input-name" placeholder="e.g. Work, Home, Study..." />
    </label>
  </div>
  <div class="popup-footer">
    <button class="secondary-btn popup-close" data-popup="popup-workspace">Cancel</button>
    <button class="danger-btn" id="btn-workspace-delete" style="display:none;">Delete</button>
    <button class="primary-btn" id="btn-workspace-save">Save</button>
  </div>
</div>


<!-- ═══════════════════════════════════════════
     POPUP: WEEKLY ROUTINE
═══════════════════════════════════════════ -->
<div class="popup" id="popup-routine">
  <div class="popup-header">
    <span class="popup-title" id="popup-routine-title">New Routine</span>
    <button class="icon-btn popup-close" data-popup="popup-routine"><i data-lucide="x"></i></button>
  </div>
  <div class="popup-body">
    <label>Title
      <input type="text" id="routine-input-title" placeholder="e.g. Exercise, Reading..." />
    </label>
    <label>Times per week
      <input type="number" id="routine-input-count" min="1" max="7" value="3" />
    </label>
    <label>Workspace
      <select id="routine-input-workspace"></select>
    </label>
  </div>
  <div class="popup-footer">
    <button class="secondary-btn popup-close" data-popup="popup-routine">Cancel</button>
    <button class="danger-btn" id="btn-routine-delete" style="display:none;">Delete</button>
    <button class="primary-btn" id="btn-routine-save">Save</button>
  </div>
</div>


<!-- ═══════════════════════════════════════════
     POPUP: MOVE TASK
═══════════════════════════════════════════ -->
<div class="popup" id="popup-move">
  <div class="popup-header">
    <span class="popup-title">Move task to...</span>
    <button class="icon-btn popup-close" data-popup="popup-move"><i data-lucide="x"></i></button>
  </div>
  <div class="popup-body">
    <div id="move-task-list">
      <!-- Task checkboxes rendered by JS when multiple tasks -->
    </div>
    <label>New date
      <input type="date" id="move-input-date" />
    </label>
  </div>
  <div class="popup-footer">
    <button class="secondary-btn popup-close" data-popup="popup-move">Cancel</button>
    <button class="primary-btn" id="btn-move-save">Move</button>
  </div>
</div>


<script src="script.js"></script>
</body>
</html>
